server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets emitted by Vite under /_app/immutable/*.
    location /_app/immutable/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pre-compressed assets (adapter-static precompress: true).
    gzip_static on;

    # SPA fallback - adapter-static is configured with fallback: 200.html.
    # index.html is the prerendered home page; 200.html is the SPA shell for
    # all other non-prerendered routes so the fallback doesn't overwrite it.
    location / {
        try_files $uri $uri/ $uri.html /200.html;
    }

    # No-cache for HTML so deploys roll out immediately.
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
