server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets emitted by Vite under /_app/immutable/*.
    location /_app/immutable/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pre-compressed assets (adapter-static precompress: true).
    gzip_static on;

    # SPA fallback — adapter-static is configured with fallback: index.html.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # No-cache for the HTML shell so deploys roll out immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
