services:
  jpa-db:
    image: postgres:18-alpine
    container_name: jpa-db
    shm_size: 2G
    restart: unless-stopped
    env_file: .env.server-db
    ports:
      - 7101:5432
    volumes:
      - jpa-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  jpa-redis:
    image: redis:8-alpine
    container_name: jpa-redis
    restart: unless-stopped
    volumes:
      - jpa-redis-data:/data
    ports:
      - 7102:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
