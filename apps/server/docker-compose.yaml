services:
  jpa-db:
    image: postgres:18-alpine
    container_name: jpa-db
    shm_size: 2G
    restart: unless-stopped
    env_file: .env.server-db
    ports:
      - 7101:5432
    volumes:
      - jpa-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  jpa-redis:
    image: redis:8-alpine
    container_name: jpa-redis
    restart: unless-stopped
    volumes:
      - jpa-redis-data:/data
    ports:
      - 7102:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jpa-minio:
    image: minio/minio:latest
    container_name: jpa-minio
    restart: unless-stopped
    env_file: .env.server-db
    ports:
      - 7105:9000
      - 7106:9001
    volumes:
      - jpa-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jpa-pg-data:
  jpa-redis-data:
  jpa-minio-data:
