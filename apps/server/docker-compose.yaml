services:
  jpa-db:
    image: postgres:18-alpine
    container_name: jpa-db
    shm_size: 2G
    restart: unless-stopped
    env_file: .env.server-db
    ports:
      - 7101:5432
    volumes:
      - jpa-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
